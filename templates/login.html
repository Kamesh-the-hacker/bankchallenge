<!DOCTYPE html>
<html>
<head>
<title>ZYR Bank</title>
<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#ffffff;
  padding:30px;
  width:350px;
  border-radius:16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

h2 {text-align:center;margin-bottom:20px;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#2563eb;
  border:none;
  border-radius:8px;
  color:white;
}

</style>
</head>

<body>

<div class="card">
<h2>🏦 ZYR Bank</h2>

<form method="POST">
<input name="username" placeholder="Account ID">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<p>{{ msg }}</p>
</div>

</body>
</html>
